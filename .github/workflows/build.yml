name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-micro-win.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            git

      - name: Build TCC
        shell: pwsh
        run: .\build.cmd

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe
      
      - name: Download MICRO
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:MICRO_URL -OutFile micro.zip
          Expand-Archive -Path micro.zip -DestinationPath .
          ls micro.sfx
      
      - name: BUILD PHAR
        shell: pwsh
        run: |
          php.exe -d "phar.readonly=0" build.php
          $micro = [System.IO.File]::ReadAllBytes('micro.sfx')
          $phar  = [System.IO.File]::ReadAllBytes('tphp.phar')
          [System.IO.File]::WriteAllBytes('tphp.exe', $micro + $phar)

      - name: Test
        shell: pwsh
        run: |
          ./tphp.exe test/main/min.php
          ./min.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir release/tphp
          Copy-Item tphp.exe release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: release

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-x86_64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: release

  # ============================================================
  # Linux aarch64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-aarch64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-aarch64
          path: release

  # ============================================================
  # macOS aarch64 — clang 编译 TCC (mob 分支)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        run: |
          set -e
          SDK=$(xcrun --show-sdk-path)
          git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src
          cd tinycc-src
          # 注意: --bindir=../tcc 会把 tcc 二进制装在 ../tcc/tcc
          # crtprefix 和 libpaths 是相对二进制的路径: ../tcc/tcc → ../lib → ../tcc/lib
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../lib:$SDK/usr/lib" \
            --libpaths="../lib:$SDK/usr/lib:/usr/lib:/usr/local/lib" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-bcheck=yes \
            --config-backtrace=yes
          make
          make install
          cd ..
          # 整理 TCC 目录结构，使 -B 能找到运行时文件（与 build.sh 一致）
          cp tcc/lib/tcc/libtcc1.a tcc/ 2>/dev/null || true
          cp tcc/lib/tcc/*.o       tcc/ 2>/dev/null || true
          mkdir -p tcc/include
          cp -r tcc/lib/tcc/include/* tcc/include/ 2>/dev/null || true
          # 补充 SDK CRT 文件
          cp $SDK/usr/lib/crt1.o tcc/lib/ 2>/dev/null || true
          # 验证：确认二进制能找到 libtcc1.a（通过编译一个小文件测试）
          ls -la tcc/tcc tcc/libtcc1.a tcc/lib/tcc/libtcc1.a
          echo 'int main(){return 0;}' > _test_tcc.c
          ./tcc/tcc -B"$PWD/tcc" -o _test_tcc _test_tcc.c && echo "TCC standalone OK" || echo "TCC FAIL"
          rm -f _test_tcc.c _test_tcc

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          file ./min
          otool -L ./min || true
          ./min
          echo "EXIT:$?"

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-macos-aarch64
          path: release
