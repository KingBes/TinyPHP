name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows — TCC / GCC / Clang
  # ============================================================
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [tcc, gcc, clang]
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
    name: Windows (${{ matrix.cc }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-clang
            git

      - name: Build TCC
        if: matrix.cc == 'tcc'
        shell: pwsh
        run: .\build.cmd

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe

      - name: Run tests
        shell: pwsh
        run: php.exe ci/test_runner.php
        env:
          TPHP_CC: ${{ matrix.cc }}

  # ============================================================
  # Linux x86_64 — TCC / GCC / Clang
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [tcc, gcc, clang]
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
    name: Linux x86_64 (${{ matrix.cc }})
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt install -y clang
          fi

      - name: Build TCC
        if: matrix.cc == 'tcc'
        run: bash build.sh

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Run tests
        run: php ci/test_runner.php
        env:
          TPHP_CC: ${{ matrix.cc }}

  # ============================================================
  # Linux aarch64 — TCC / GCC / Clang
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        cc: [tcc, gcc, clang]
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
    name: Linux aarch64 (${{ matrix.cc }})
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt install -y clang
          fi

      - name: Build TCC
        if: matrix.cc == 'tcc'
        run: bash build.sh

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Run tests
        run: php ci/test_runner.php
        env:
          TPHP_CC: ${{ matrix.cc }}

  # ============================================================
  # macOS aarch64 — TCC / Clang (GCC is just clang alias)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [clang, tcc]
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
    name: macOS (${{ matrix.cc }})
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        if: matrix.cc == 'tcc'
        run: |
          set -e
          export LANG=C
          SDK=$(xcrun --show-sdk-path)
          git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src
          cd tinycc-src
          for i in include/*.h; do test -f $i && ln -sf $i $(basename $i); done
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../tcc:/usr/lib" \
            --libpaths="../tcc:/usr/local/lib:/usr/lib:/lib" \
            --sysincludepaths="../tcc/include:/usr/local/include:$SDK/usr/include" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-new_macho=yes \
            --config-codesign=yes \
            --config-bcheck=yes \
            --config-backtrace=yes \
            --enable-static
          make
          make install
          cd ..
          find tcc -name libtcc1.a -exec cp {} tcc/libtcc1.a \; -quit
          test -f tcc/libtcc1.a || { echo "ERROR: libtcc1.a not found"; exit 1; }
          rm -rf tinycc-src

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Run tests
        run: php ci/test_runner.php
        env:
          TPHP_CC: ${{ matrix.cc }}
